<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineeManch</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

html, body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/* ANIMATION */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    width: 100%;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10,10,10,0.6);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    z-index: 1000;
    animation: fadeUp 0.6s ease;
}

.logo {
    font-size: 22px;
    font-weight: 700;
}

.logo span {
    color: #ff2d2d;
}

.logo small {
    display: block;
    font-size: 11px;
    color: #aaa;
}

.nav-links {
    display: flex;
    flex-wrap: wrap;
}

.nav-links a {
    color: #ddd;
    text-decoration: none;
    margin: 5px 10px;
    font-size: 14px;
    transition: 0.3s;
}

.nav-links a:hover {
    color: #fff;
}

/* MUSIC BUTTON */
.music-toggle button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: 0.3s;
}

.music-toggle button:hover {
    border-color: #ff2d2d;
    background: rgba(255,45,45,0.15);
}

/* HERO */
.hero {
    position: relative;
    height: 65vh;
    min-height: 380px;
    background: url("Banner 1.png") center/cover no-repeat;
    display: flex;
    align-items: center;
    padding-left: 70px;
    animation: fadeUp 0.8s ease;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at left, rgba(0,0,0,0.85), rgba(0,0,0,0.4));
}

.hero-content {
    position: relative;
    z-index: 2;
    max-width: 600px;
}

.hero-content h1 {
    font-size: 60px;
    margin: 0;
}

.hero-content span {
    color: #ff2d2d;
}

.hero-content p {
    color: #bbb;
    margin: 12px 0 25px;
}

/* BUTTONS */
.buttons a {
    padding: 12px 18px;
    margin-right: 10px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    display: inline-block;
    transition: 0.3s;
}

.btn-red {
    background: #ff2d2d;
    color: white;
}

.btn-outline {
    border: 1px solid white;
    color: white;
}

.btn-red:hover,
.btn-outline:hover {
    transform: translateY(-2px);
}

/* DIVIDER */
.divider {
    height: 1px;
    margin: 40px 0;
    background: linear-gradient(to right, transparent, #ff2d2d, transparent);
}

/* SECTION */
.latest {
    padding: 20px 40px 60px;
    animation: fadeUp 1s ease;
}

.latest h2 {
    border-left: 4px solid #ff2d2d;
    padding-left: 10px;
}

/* GRID */
.video-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 22px;
}

/* VIDEO CARD */
.video-card {
    background: #0f0f0f;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.4s;
    border: 1px solid rgba(255,255,255,0.05);
}

.video-card:hover {
    transform: translateY(-6px);
    border-color: rgba(255,45,45,0.4);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

.video-card iframe {
    width: 100%;
    aspect-ratio: 16 / 9;
    border: none;
}

.video-card .info {
    padding: 12px;
}

.video-card h3 {
    font-size: 14px;
    margin: 0;
    color: #ddd;
}

/* RESPONSIVE */
@media (max-width: 1024px) {
    .video-grid {
        grid-template-columns: repeat(2, 1fr);
    }
    .hero-content h1 {
        font-size: 45px;
    }
}

@media (max-width: 768px) {
    .hero {
        padding-left: 20px;
    }
    .nav-links {
        display: none;
    }
}

@media (max-width: 600px) {
    .video-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="bgMusic" loop>
    <source src="cinematic.mp3" type="audio/mpeg">
</audio>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">
        Cinee<span>Manch</span>
        <small>सिनेमंच</small>
    </div>

    <div class="nav-links">
        <a href="#" class="active">Home</a>
        <a href="reviews.html">Reviews</a>
        <a href="#">Recommended</a>
        <a href="#">Box Office</a>
        <a href="#">About</a>
    </div>

    <div class="music-toggle">
        <button onclick="toggleMusic()" id="musicBtn">🎵 Music Off</button>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <h1>Cinee<span>Manch</span></h1>
        <p>सिनेमा की हर बात, हमारे साथ</p>

        <div class="buttons">
            <a href="reviews.html" class="btn-red">▶ Watch Latest</a>
            <a href="#" class="btn-outline">Must Watch</a>
        </div>
    </div>
</div>

<div class="divider"></div>

<!-- LATEST -->
<div class="latest">
    <h2>Latest Reviews</h2>

    <div class="video-grid">

        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/GB8ICqVQQMw" allowfullscreen></iframe>
            <div class="info"><h3>Daadi Ki Shaadi Trailer Review</h3></div>
        </div>

        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/FrqmF_AEU5s" allowfullscreen></iframe>
            <div class="info"><h3>Raja Shivaji Review</h3></div>
        </div>

        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/AGQSZcQypdI" allowfullscreen></iframe>
            <div class="info"><h3>Kattalan Movie Review</h3></div>
        </div>

        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/-lKZ7ufRtYs" allowfullscreen></iframe>
            <div class="info"><h3>Pati Patni Aur Woh Review</h3></div>
        </div>

    </div>
</div>

<!-- SCRIPT -->
<script>
let musicOn = false;
const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

if (localStorage.getItem("musicOn") === "true") {
    musicOn = true;
    music.play().catch(() => {});
    btn.innerText = "🔊 Music On";
}

function toggleMusic() {
    if (musicOn) {
        music.pause();
        btn.innerText = "🎵 Music Off";
        musicOn = false;
    } else {
        music.play().catch(() => {});
        btn.innerText = "🔊 Music On";
        musicOn = true;
    }
    localStorage.setItem("musicOn", musicOn);
}
</script>

</body>
</html>
