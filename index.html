<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineeManch</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: white;
}

/* NAVBAR */
.navbar {
    position: absolute;
    top: 0;
    width: 100%;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    z-index: 10;
}

.logo { font-size: 24px; font-weight: bold; }
.logo span { color: red; }
.logo small { display: block; font-size: 12px; color: #ccc; }

.nav-links a {
    color: white;
    text-decoration: none;
    margin: 0 12px;
    font-size: 14px;
}
.nav-links a:hover { color: red; }

/* HERO */
.hero {
    position: relative;
    height: 100vh;
    background: url("Banner.png") center/cover no-repeat;
    display: flex;
    align-items: center;
    padding-left: 60px;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.3));
}

.hero-content {
    position: relative;
    z-index: 2;
}

.hero-content h1 { font-size: 60px; margin: 0; }
.hero-content span { color: red; }
.hero-content p { color: #ccc; }

.buttons a {
    padding: 12px 20px;
    margin-right: 10px;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
}
.btn-red { background: red; color: white; }
.btn-outline { border: 1px solid white; color: white; }

/* DIVIDER */
.divider {
    height: 2px;
    background: linear-gradient(to right, transparent, red, transparent);
    margin: 40px 0;
}

/* LATEST REVIEWS */
.latest {
    padding: 20px 40px 60px;
}

.latest h2 {
    border-left: 4px solid red;
    padding-left: 10px;
}

/* GRID FIXED */
.video-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
}

/* VIDEO CARD */
.video-card {
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
}

.video-card:hover {
    transform: scale(1.05);
}

.video-card iframe,
.video-card img {
    width: 100%;
    height: 180px;
    border: none;
}

.video-card .info {
    padding: 10px;
}

.video-card h3 {
    font-size: 14px;
    margin: 0;
}

/* MOBILE */
@media (max-width: 768px) {
    .nav-links { display: none; }
    .hero-content h1 { font-size: 36px; }
    .hero { padding-left: 20px; }

    .video-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">
        Cinee<span>Manch</span>
        <small>सिनेमंच</small>
    </div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Reviews</a>
        <a href="#">Trailer</a>
        <a href="#">Box Office</a>
        <a href="#">News</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <h1>Cinee<span>Manch</span></h1>
        <p>सिनेमा की हर बात, हमारे साथ</p>

        <div class="buttons">
            <a href="https://youtube.com/@cineemanch" class="btn-red">▶ Watch Latest</a>
            <a href="#" class="btn-outline">Subscribe</a>
        </div>
    </div>
</div>

<!-- DIVIDER -->
<div class="divider"></div>

<!-- LATEST REVIEWS -->
<div class="latest">
    <h2>Latest Reviews</h2>

    <div class="video-grid">

        <!-- VIDEO 1 -->
        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/GB8ICqVQQMw" allowfullscreen></iframe>
            <div class="info">
                <h3>Daadi Ki Shaadi Trailer Review</h3>
            </div>
        </div>

        <!-- VIDEO 2 -->
        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/FrqmF_AEU5s" allowfullscreen></iframe>
            <div class="info">
                <h3>Raja Shivaji Review</h3>
            </div>
        </div>

        <!-- VIDEO 3 -->
        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
            <div class="info">
                <h3>Your Next Video</h3>
            </div>
        </div>

        <!-- VIDEO 4 -->
        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
            <div class="info">
                <h3>Your Next Video</h3>
            </div>
        </div>

    </div>
</div>

</body>
</html>
