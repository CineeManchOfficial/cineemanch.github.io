<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineeManch</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: white;
}

/* NAVBAR (STICKY) */
.navbar {
    position: sticky;
    top: 0;
    width: 100%;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(6px);
    z-index: 1000;
}

.logo { font-size: 24px; font-weight: bold; }
.logo span { color: red; }
.logo small { display: block; font-size: 12px; color: #ccc; }

.nav-links a {
    color: white;
    text-decoration: none;
    margin: 0 12px;
    font-size: 14px;
    transition: 0.3s;
}
.nav-links a:hover,
.nav-links .active {
    color: red;
}

/* HERO */
.hero {
    position: relative;
    height: 60vh;
    min-height: 350px;
    max-height: 500px;
    background: url("Banner 1.png") center/cover no-repeat;
    display: flex;
    align-items: center;
    padding-left: 60px;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.3));
}

.hero-content {
    position: relative;
    z-index: 2;
}

.hero-content h1 {
    font-size: 60px;
    margin: 0;
}

.hero-content span { color: red; }

.hero-content p {
    color: #ccc;
    margin: 10px 0 20px;
}

/* BUTTONS */
.buttons a {
    padding: 12px 20px;
    margin-right: 10px;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
}

.btn-red {
    background: red;
    color: white;
}

.btn-outline {
    border: 1px solid white;
    color: white;
}

/* DIVIDER */
.divider {
    height: 2px;
    background: linear-gradient(to right, transparent, red, transparent);
    margin: 40px 0;
}

/* LATEST REVIEWS */
.latest {
    padding: 20px 40px 60px;
}

.latest h2 {
    border-left: 4px solid red;
    padding-left: 10px;
}

/* GRID */
.video-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
}

/* VIDEO CARD */
.video-card {
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
}

.video-card:hover {
    transform: scale(1.05);
}

.video-card iframe {
    width: 100%;
    aspect-ratio: 16 / 9;
    height: auto;
    border: none;
}

.video-card .info {
    padding: 10px;
}

.video-card h3 {
    font-size: 14px;
    margin: 0;
}

/* MOBILE */
@media (max-width: 768px) {
    .nav-links {
        display: none;
    }

    .hero {
        padding-left: 20px;
    }

    .hero-content h1 {
        font-size: 36px;
    }

    .video-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">
        Cinee<span>Manch</span>
        <small>सिनेमंच</small>
    </div>

    <div class="nav-links">
        <a href="#" class="active">Home</a>
        <a href="reviews.html">Reviews</a>
        <a href="#">Recommended Movies</a>
        <a href="#">Box Office</a>
        <a href="#">About Us</a>
        <a href="#">sSearch</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <h1>Cinee<span>Manch</span></h1>
        <p>सिनेमा की हर बात, हमारे साथ</p>

        <div class="buttons">
            <a href="reviews.html" class="btn-red">▶ Watch Latest</a>
            <a href="#" class="btn-outline">Must Watch</a>
        </div>
    </div>
</div>

<!-- DIVIDER -->
<div class="divider"></div>

<!-- LATEST REVIEWS -->
<div class="latest">
    <h2>Latest Reviews</h2>

    <div class="video-grid">

        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/GB8ICqVQQMw" allowfullscreen></iframe>
            <div class="info">
                <h3>Daadi Ki Shaadi Trailer Review</h3>
            </div>
        </div>

        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/FrqmF_AEU5s" allowfullscreen></iframe>
            <div class="info">
                <h3>Raja Shivaji Review</h3>
            </div>
        </div>

        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/AGQSZcQypdI" allowfullscreen></iframe>
            <div class="info">
                <h3>Kattalan Movie Trailer Review</h3>
            </div>
        </div>

        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/-lKZ7ufRtYs" allowfullscreen></iframe>
            <div class="info">
                <h3>Pati Patni Aur Woh Do Teaser Review</h3>
            </div>
        </div>

    </div>
</div>

</body>
</html>
