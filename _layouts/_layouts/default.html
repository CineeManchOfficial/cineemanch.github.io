<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>

<!-- Optional: Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* ================= GLOBAL THEME ================= */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100vh;
    overflow-x: hidden;

    background: #000;   /* 🔥 FIX WHITE SCREEN */
    color: #fff;
    font-family: Inter, sans-serif;
}

/* Prevent layout overflow issues */
* {
    box-sizing: border-box;
}

/* ================= FULL WIDTH RESET (SAFE VERSION) ================= */
div, main, section, header {
    max-width: none;
}

/* ================= JEKYLL STRUCTURE CLEANUP ================= */
.page-content,
.wrapper,
.container,
.content,
.post,
.post-content {
    width: 100%;
    max-width: 100%;
    margin: 0;
    padding-left: 0;
    padding-right: 0;
    background: transparent;
}

/* ================= LINKS ================= */
a {
    color: inherit;
    text-decoration: none;
}

/* ================= IMAGE SAFETY ================= */
img {
    max-width: 100%;
    display: block;
}

/* ================= OPTIONAL SCROLL FIX ================= */
body {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}
</style>

</head>

<body>

{{ content }}

</body>
</html>
