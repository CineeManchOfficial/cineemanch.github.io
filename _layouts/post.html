<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

iframe {
    width: 100%;
    aspect-ratio: 16/9;
    border: none;
    border-radius: 10px;
}

h1 {
    color: red;
}
</style>
</head>

<body>

<div class="container">

    <h1>{{ page.title }}</h1>

    <iframe src="{{ page.video }}"></iframe>

    <p>{{ page.description }}</p>

    <div>
        {{ content }}
    </div>

</div>

</body>
</html>
