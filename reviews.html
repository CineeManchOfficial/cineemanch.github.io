---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviews - CineeManch</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

/* ================= RESET ================= */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    overflow-x: hidden;
}

/* ================= NAVBAR ================= */
.navbar {
    position: sticky;
    top: 0;
    width: 100%;
    padding: 15px 4%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    z-index: 1000;
}

.logo { font-size: 24px; font-weight: 700; }
.logo span { color: #ff2d2d; }
.logo small { font-size: 11px; color: #aaa; display: block; }

.nav-links {
    display: flex;
    gap: 25px;
}

.nav-links a {
    color: #ccc;
    text-decoration: none;
    font-size: 15px;
}

.nav-links .active {
    color: #fff;
}

/* ================= BANNER ================= */
.banner {
    width: 100%;
    height: 45vh;
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)),
                url("Banner 2.png") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}

.banner h1 {
    font-size: clamp(36px, 8vw, 80px);
    text-transform: uppercase;
    letter-spacing: 4px;
}

/* ================= CONTAINER (WIDER PAGE) ================= */
.content-width {
    width: 100%;
    max-width: 1200px; /* 🔥 wider page */
    margin: 0 auto;
    padding: 70px 25px;
}

/* ================= REVIEW CARD ================= */
.review-item {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 22px;
    margin-bottom: 60px;
    background: #0a0a0a;
    padding: 30px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.08);
}

/* ================= VIDEO ================= */
.video-wrapper {
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 18px;
    overflow: hidden;
    background: #111;
}

.video-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* ================= TEXT ================= */
.review-text h2 {
    color: #ff2d2d;
    font-size: 28px;
    margin-bottom: 12px;
    line-height: 1.3;
}

.desc-text {
    color: #bbb;
    line-height: 1.8;
    font-size: 16px;
}

/* ================= DESKTOP STRETCHED LAYOUT ================= */
@media (min-width: 1024px) {

    .review-item {
        flex-direction: row;
        align-items: stretch;
        gap: 50px;
        padding: 40px;
    }

    /* 🔥 VIDEO TAKES MOST SPACE */
    .video-wrapper {
        flex: 2.4; /* very wide video */
    }

    /* TEXT SIDE */
    .review-text {
        flex: 1.2;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .review-text h2 {
        font-size: 34px;
        margin-bottom: 15px;
    }

    .desc-text {
        font-size: 18px;
        line-height: 1.9;
    }
}

</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar">
    <div class="logo">Cinee<span>Manch</span><small>सिनेमंच</small></div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="reviews.html" class="active">Reviews</a>
        <a href="#">Recommended</a>
        <a href="#">Box Office</a>
        <a href="#">About</a>
    </div>
</nav>

<!-- BANNER -->
<header class="banner">
    <h1>Movie Reviews</h1>
</header>

<!-- REVIEWS -->
<main>
    <div class="content-width">

        {% for post in site.posts %}
        <article class="review-item">

            <!-- VIDEO -->
            <div class="video-wrapper">
                {% if post.video %}
                <iframe src="{{ post.video }}" allowfullscreen></iframe>
                {% else %}
                <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#444;">
                    No Video Found
                </div>
                {% endif %}
            </div>

            <!-- TEXT -->
            <div class="review-text">
                <h2>{{ post.title }}</h2>
                <p class="desc-text">
                    {{ post.description | default: post.excerpt | strip_html }}
                </p>
            </div>

        </article>
        {% endfor %}

    </div>
</main>

</body>
</html>
