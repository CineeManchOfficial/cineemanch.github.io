---
layout: default
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - CineeManch</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        /* ================= RESET & GLOBAL ================= */
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #000;
            color: white;
            overflow-x: hidden;
            width: 100%;
        }

        /* The container that stretches but keeps margins on big screens */
        .wrapper {
            width: 100%;
            padding: 0 5%; /* 5% breathing room on both sides */
            margin: 0 auto;
        }

        /* ================= NAVBAR ================= */
        .navbar {
            position: sticky;
            top: 0;
            width: 100%;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }
        .logo { font-size: 22px; font-weight: 700; line-height: 1.1; }
        .logo span { color: #ff2d2d; }
        .logo small { display: block; font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

        .nav-links { display: none; gap: 25px; } /* Hidden on mobile by default */
        .nav-links a { color: #ccc; text-decoration: none; font-size: 14px; font-weight: 500; }
        .nav-links .active { color: #fff; border-bottom: 2px solid #ff2d2d; padding-bottom: 4px; }

        /* ================= BANNER ================= */
        .banner {
            width: 100%;
            height: 35vh; /* Shorter for mobile */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), url("Banner 2.png") center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .banner h1 {
            font-size: clamp(32px, 8vw, 80px);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0;
        }

        /* ================= REVIEW ITEMS (Mobile First) ================= */
        .reviews-container { padding: 40px 0; }
        
        .review-item {
            display: flex;
            flex-direction: column; /* Stacked on mobile */
            gap: 20px;
            margin-bottom: 40px;
            background: #0f0f0f;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .video-wrapper { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            border-radius: 10px;
            overflow: hidden;
            background: #1a1a1a;
        }
        .video-wrapper iframe { width: 100%; height: 100%; border: none; }
        
        .review-text h2 { color: #ff2d2d; font-size: 22px; margin: 0 0 10px 0; }
        .review-text p { color: #bbb; line-height: 1.6; font-size: 15px; margin: 0; }

        /* ================= LAPTOP/DESKTOP UPGRADES ================= */
        @media (min-width: 1024px) {
            .nav-links { display: flex; } /* Show menu on laptop */
            
            .banner { height: 50vh; } /* Taller banner on laptop */
            
            .review-item {
                flex-direction: row; /* Side-by-side on laptop */
                padding: 40px;
                gap: 50px;
                align-items: center;
            }
            
            .video-wrapper { flex: 0 0 55%; } /* Video takes 55% of width */
            
            .review-text h2 { font-size: 32px; }
            .review-text p { font-size: 18px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Cinee<span>Manch</span><small>सिनेमंच</small></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="reviews.html" class="active">Reviews</a>
            <a href="#">Recommended</a>
            <a href="#">Box Office</a>
            <a href="#">About</a>
        </div>
        <div style="color:#ff2d2d; font-size:24px; cursor:pointer;" class="mobile-only">☰</div>
    </nav>

    <header class="banner">
        <h1>Movie Reviews</h1>
    </header>

    <main class="reviews-container">
        <div class="wrapper">
            {% for post in site.posts %}
            <article class="review-item">
                <div class="video-wrapper">
                    {% if post.video %}
                        <iframe src="{{ post.video }}" allowfullscreen loading="lazy"></iframe>
                    {% else %}
                        <div style="height:100%; display:flex; align-items:center; justify-content:center; color:#444;">
                            [ No Video ]
                        </div>
                    {% endif %}
                </div>
                
                <div class="review-text">
                    <h2>{{ post.title }}</h2>
                    <p>{{ post.description | truncate: 280 }}</p>
                </div>
            </article>
            {% endfor %}
        </div>
    </main>

</body>
</html>
